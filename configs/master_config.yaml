
kappa: 2.0
xi: 0.01

# Candidate generation
n_global_factor: 3000
n_trust_base: 24
trust_radius_base: 0.02

# Surrogate model
use_nn: false
nu: 2.5
standardize_y: true
n_restarts_min: 30
n_restarts_max: 60
max_fit_points: 2000

# SVM gating
use_svm: true
svm_kernel: rbf
svm_C: 1.0
svm_gamma: scale
svm_high_quantile: 0.70
svm_keep_frac: 0.50

# Feature screening
use_feature_screen: true
ard_rel_threshold: 0.15

# Perturbations
use_perturbations: true
perturb_rate_base: 0.05

# PCA
default_pca: false
use_pca: false
pca_var_keep: 0.90

# Scalability
batch_predict_size: 10000
max_candidates: 10000
sample_strategy: sobol
random_state: 0

# Hard bounds
hard_bounds: {}
