# === Acquisition ===
xi: 0.05
kappa: 3.0

# === SVM Gating ===
use_svm: true
svm_kernel: rbf
svm_C: 0.8
svm_high_quantile: 0.80
svm_keep_frac: 0.65

# === Feature Screening (ARD) ===
use_feature_screen: false
ard_rel_threshold: 0.20

# === PCA ===
use_pca: false
pca_var_keep: 0.99

# === GP Fit & Stability ===
standardize_y: true
max_fit_points: 2500
random_state: 0

# === Neural Network Surrogate (unused but preserved) ===
use_nn: false
nn_hidden_layers: [128, 128]
nn_activation: relu
nn_learning_rate: 0.001
nn_weight_decay: 0.0001
nn_epochs: 150
nn_ensemble: 4

# === Perturbations ===
use_perturbations: true
perturb_rate_base: 0.30

# === Global / Local Sampling ===
n_global_factor: 6000
max_candidates: 20000

# === Trust Region ===
trust_radius_base: 0.08
n_trust_base: 64

# === Batch Prediction ===
batch_predict_size: 20000

# === Control Flags ===
improved_last_round: false
